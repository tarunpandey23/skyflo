{{- if not .Values.engine.secrets.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "skyflo.engine.secretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "skyflo.labels" . | nindent 4 }}
type: Opaque
stringData:
  LLM_MODEL: {{ .Values.engine.secrets.llmModel | quote }}
  {{- with .Values.engine.secrets.llmHost }}
  LLM_HOST: {{ . | quote }}
  {{- end }}
  JWT_SECRET: {{ include "skyflo.jwtSecret" . | quote }}
  {{- if not .Values.postgresql.enabled }}
  {{- with .Values.engine.secrets.llmReasoningEffort }}
  LLM_REASONING_EFFORT: {{ . | quote }}
  {{- end }}
  {{- with .Values.engine.secrets.llmThinkingBudgetTokens }}
  LLM_THINKING_BUDGET_TOKENS: {{ . | quote }}
  {{- end }}
  {{- with .Values.engine.secrets.llmMaxTokens }}
  LLM_MAX_TOKENS: {{ . | quote }}
  {{- end }}
  POSTGRES_DATABASE_URL: {{ include "skyflo.postgres.url" . | quote }}
  {{- end }}
  REDIS_URL: {{ include "skyflo.redis.url" . | quote }}
  {{- with .Values.engine.secrets.openaiApiKey }}
  OPENAI_API_KEY: {{ . | quote }}
  {{- end }}
  {{- with .Values.engine.secrets.anthropicApiKey }}
  ANTHROPIC_API_KEY: {{ . | quote }}
  {{- end }}
  {{- with .Values.engine.secrets.azureApiKey }}
  AZURE_API_KEY: {{ . | quote }}
  {{- end }}
  {{- with .Values.engine.secrets.geminiApiKey }}
  GEMINI_API_KEY: {{ . | quote }}
  {{- end }}
  {{- with .Values.engine.secrets.cohereApiKey }}
  COHERE_API_KEY: {{ . | quote }}
  {{- end }}
  {{- with .Values.engine.secrets.mistralApiKey }}
  MISTRAL_API_KEY: {{ . | quote }}
  {{- end }}
  {{- with .Values.engine.secrets.groqApiKey }}
  GROQ_API_KEY: {{ . | quote }}
  {{- end }}
  {{- with .Values.engine.secrets.anyscaleApiKey }}
  ANYSCALE_API_KEY: {{ . | quote }}
  {{- end }}
  {{- with .Values.engine.secrets.openrouterApiKey }}
  OPENROUTER_API_KEY: {{ . | quote }}
  {{- end }}
  {{- with .Values.engine.secrets.perplexityaiApiKey }}
  PERPLEXITYAI_API_KEY: {{ . | quote }}
  {{- end }}
  {{- with .Values.engine.secrets.fireworksAiApiKey }}
  FIREWORKS_AI_API_KEY: {{ . | quote }}
  {{- end }}
  {{- with .Values.engine.secrets.togetheraiApiKey }}
  TOGETHERAI_API_KEY: {{ . | quote }}
  {{- end }}
  {{- with .Values.engine.secrets.deepinfraApiKey }}
  DEEPINFRA_API_KEY: {{ . | quote }}
  {{- end }}
  {{- with .Values.engine.secrets.ai21ApiKey }}
  AI21_API_KEY: {{ . | quote }}
  {{- end }}
  {{- with .Values.engine.secrets.nlpCloudApiKey }}
  NLP_CLOUD_API_KEY: {{ . | quote }}
  {{- end }}
  {{- with .Values.engine.secrets.replicateApiKey }}
  REPLICATE_API_KEY: {{ . | quote }}
  {{- end }}
  {{- with .Values.engine.secrets.hfToken }}
  HF_TOKEN: {{ . | quote }}
  {{- end }}
  {{- with .Values.engine.secrets.databricksToken }}
  DATABRICKS_TOKEN: {{ . | quote }}
  {{- end }}
  {{- with .Values.engine.secrets.clarifaiPat }}
  CLARIFAI_PAT: {{ . | quote }}
  {{- end }}
  {{- with .Values.engine.secrets.voyageApiKey }}
  VOYAGE_API_KEY: {{ . | quote }}
  {{- end }}
  {{- with .Values.engine.secrets.jinaaiApiKey }}
  JINAAI_API_KEY: {{ . | quote }}
  {{- end }}
  {{- with .Values.engine.secrets.alephalphaApiKey }}
  ALEPHALPHA_API_KEY: {{ . | quote }}
  {{- end }}
  {{- with .Values.engine.secrets.basetenApiKey }}
  BASETEN_API_KEY: {{ . | quote }}
  {{- end }}
  {{- with .Values.engine.secrets.sambanovaApiKey }}
  SAMBANOVA_API_KEY: {{ . | quote }}
  {{- end }}
  {{- with .Values.engine.secrets.featherlessAiApiKey }}
  FEATHERLESS_AI_API_KEY: {{ . | quote }}
  {{- end }}
  {{- with .Values.engine.secrets.ollamaApiKey }}
  OLLAMA_API_KEY: {{ . | quote }}
  {{- end }}
  {{- with .Values.engine.secrets.ibmApiKey }}
  IBM_API_KEY: {{ . | quote }}
  {{- end }}
  {{- with .Values.engine.secrets.predibaseApiKey }}
  PREDIBASE_API_KEY: {{ . | quote }}
  {{- end }}
  {{- with .Values.engine.secrets.nvidiaNgcApiKey }}
  NVIDIA_NGC_API_KEY: {{ . | quote }}
  {{- end }}
  {{- with .Values.engine.secrets.xaiApiKey }}
  XAI_API_KEY: {{ . | quote }}
  {{- end }}
  {{- with .Values.engine.secrets.volcengineApiKey }}
  VOLCENGINE_API_KEY: {{ . | quote }}
  {{- end }}
  {{- with .Values.engine.secrets.moonshotApiKey }}
  MOONSHOT_API_KEY: {{ . | quote }}
  {{- end }}
  {{- with .Values.engine.secrets.deepseekApiKey }}
  DEEPSEEK_API_KEY: {{ . | quote }}
  {{- end }}
  {{- with .Values.engine.secrets.awsAccessKeyId }}
  AWS_ACCESS_KEY_ID: {{ . | quote }}
  {{- end }}
  {{- with .Values.engine.secrets.awsSecretAccessKey }}
  AWS_SECRET_ACCESS_KEY: {{ . | quote }}
  {{- end }}
  {{- with .Values.engine.secrets.awsRegionName }}
  AWS_REGION_NAME: {{ . | quote }}
  {{- end }}
{{- end }}
