{{- if .Values.ui.ingress.enabled }}
{{- if eq (len .Values.ui.ingress.hosts) 0 }}
{{- fail "ui.ingress.hosts must list at least one host when ui.ingress.enabled is true" }}
{{- end }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "skyflo.ui.ingressName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "skyflo.labels" . | nindent 4 }}
    {{- with .Values.ui.ingress.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with .Values.ui.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with .Values.ui.ingress.className }}
  ingressClassName: {{ . | quote }}
  {{- end }}
  {{- with .Values.ui.ingress.tls }}
  tls:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  rules:
    {{- range $h := .Values.ui.ingress.hosts }}
    - host: {{ required "ui.ingress.hosts[].host is required" $h.host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "skyflo.ui.fullname" $ }}
                port:
                  name: {{ $.Values.ui.ingress.servicePortName | default "http" | quote }}
{{- end }}
{{- end }}
